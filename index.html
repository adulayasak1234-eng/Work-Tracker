<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Tracker</title>
<style>
*{box-sizing:border-box;font-family:"Segoe UI",Arial,sans-serif}
body{margin:0;background:#f0f2f5;color:#2c3e50;padding:0;height:100vh;display:flex;flex-direction:column}
h1{text-align:center;margin:0 0 10px}
#topFixed{position:sticky;top:0;z-index:50;background:#f0f2f5;padding:12px 20px 10px;border-bottom:1px solid #ddd;display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap}
#topLeft{flex:1;min-width:300px}
  #scrollArea { flex:1; overflow-y:auto; padding:10px 20px 20px; position:relative; }
.toolbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;align-items:center}
.toolbar input,.toolbar select{padding:7px 10px;border:1px solid #ccc;border-radius:8px;font-size:12px}
button{cursor:pointer;border:none;border-radius:8px;padding:8px 14px;font-weight:600;font-size:12px}
a.nav-btn{background:#e67e22;color:#fff;padding:8px 14px;border-radius:8px;font-weight:600;text-decoration:none;font-size:12px}
.btn-add{background:#27ae60;color:#fff}.btn-export{background:#2980b9;color:#fff}
.btn-tl{background:#8e44ad;color:#fff;padding:4px 8px;font-size:11px;margin-top:6px}
.count { color:#7f8c8d; font-size:12px; position:absolute; right:20px; }
table{width:100%;border-collapse:collapse;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.08);border-radius:10px;overflow:hidden}
th{background:#1a5c3a;color:#fff;padding:9px 6px;font-size:11px;text-align:left}
td{border:1px solid #e1e5ea;padding:7px 5px;font-size:12px;vertical-align:top}
td[contenteditable]:focus,div[contenteditable]:focus{outline:2px solid #3498db;background:#f0f8ff}
select{padding:3px;border-radius:6px;cursor:pointer;font-size:11px}
input[type="date"]{padding:3px;border:1px solid #ccc;border-radius:6px;font-size:11px}
tr:hover{background:#f8f9fa}
.img-area{margin-top:5px}.img-area img{width:160px;max-height:120px;object-fit:cover;border-radius:6px;cursor:zoom-in;border:1px solid #ddd;margin:2px;display:block}
.img-area .iw{display:inline-block;position:relative}.img-area .ir{position:absolute;top:2px;right:2px;background:rgba(231,76,60,.9);color:#fff;border:none;border-radius:50%;width:16px;height:16px;cursor:pointer;font-size:10px;display:none}.img-area .iw:hover .ir{display:block}
#ctxMenu{display:none;position:fixed;z-index:1000;background:#fff;border:1px solid #ddd;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.15);padding:6px 0;min-width:150px}
#ctxMenu .ctx-item{padding:8px 16px;font-size:12px;cursor:pointer}#ctxMenu .ctx-item:hover{background:#f0f0f0}#ctxMenu .ctx-del{color:#e74c3c}
#formatBar{margin-bottom:6px;display:flex;flex-wrap:wrap;gap:4px;align-items:center}
#formatBar button{padding:3px 8px;background:#eee;border:1px solid #ccc;font-size:11px}
#formatBar select{padding:3px;border:1px solid #ccc;border-radius:6px;font-size:11px}
#formatBar span{font-size:11px;color:#666}
.tl-panel{display:none;background:#f9f9f9;border:1px solid #ddd;padding:10px;margin-top:5px;border-radius:8px}.tl-panel.open{display:block}
.tl-add{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap}.tl-add input,.tl-add textarea{padding:4px;border:1px solid #ccc;border-radius:6px;font-size:10px}.tl-add textarea{flex:1;min-width:60px;resize:none;height:26px}
.timeline{position:relative;padding-left:16px}.timeline::before{content:"";position:absolute;left:5px;top:0;bottom:0;width:3px;background:linear-gradient(#3498db,#2ecc71);border-radius:2px}
.tl-item{position:relative;margin-bottom:8px;padding-left:12px;padding-right:40px;cursor:pointer;border-radius:6px;padding-top:3px;padding-bottom:3px}.tl-item:hover{background:rgba(0,0,0,.03)}
.tl-item::before{content:"";position:absolute;left:-12px;top:6px;width:12px;height:12px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tl-item.nd-done::before{background:#27ae60}.tl-item.nd-prog::before{background:#f39c12}.tl-item.nd-wait::before{background:#bbb}
.tl-title{font-weight:700;font-size:11px}.tl-desc{font-size:10px;color:#555}.tl-date{font-size:9px;color:#888}
.tl-del-btn,.tl-edit-btn{position:absolute;top:4px;background:none;color:#ccc;border:none;font-size:10px;cursor:pointer;display:none;padding:2px;opacity:.5}
.tl-del-btn{right:4px}.tl-edit-btn{right:20px}.tl-del-btn:hover{opacity:1;color:#e74c3c}.tl-edit-btn:hover{opacity:1;color:#3498db}
.tl-item:hover .tl-del-btn,.tl-item:hover .tl-edit-btn{display:block}
.tl-legend{display:flex;gap:6px;font-size:9px;margin-bottom:6px}.tl-legend .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:2px}
#notifBell{position:fixed;top:10px;right:20px;z-index:999;background:none;border:none;font-size:22px;cursor:pointer}
#notifBadge{position:absolute;top:-4px;right:-6px;background:#e74c3c;color:#fff;font-size:9px;border-radius:50%;min-width:16px;height:16px;display:none;align-items:center;justify-content:center;font-weight:700}
#notifPanel{display:none;position:fixed;top:40px;right:10px;width:300px;max-height:380px;overflow-y:auto;background:#fff;border:1px solid #ddd;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:998;padding:10px}
.notif-item{padding:7px;border-radius:6px;margin-bottom:5px;font-size:11px;border-left:4px solid;cursor:pointer}.notif-item:hover{opacity:.8}
.notif-item.overdue{background:#fadbd8;border-left-color:#e74c3c}.notif-item.today{background:#fef9e7;border-left-color:#f39c12}.notif-item.upcoming{background:#d6eaf8;border-left-color:#3498db}
.notif-item.read{opacity:0.4}.notif-item .ni-title{font-weight:700}.notif-item .ni-date{color:#888;font-size:10px}
.ni-check{margin-right:6px}
#notifActions{display:none;margin-bottom:8px;padding:6px;background:#ffeaa7;border-radius:6px;font-size:11px}
#notifActions button{font-size:10px;padding:4px 8px;margin-left:4px}
@keyframes flashHL{0%,100%{background:transparent}25%,75%{background:#f1c40f}}
tr.flash{animation:flashHL 1.5s ease 2}
  #notifBell { position:fixed; top:10px; right:12px; z-index:999; background:none; border:none; font-size:22px; cursor:pointer; }
.cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}.cal-nav button{background:none;border:none;font-size:14px;cursor:pointer;padding:2px 6px}.cal-nav span{font-weight:700;font-size:11px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;text-align:center;font-size:9px}
.cal-grid .hd{font-weight:700;color:#666;padding:2px}
.cal-day{padding:3px 1px;border-radius:4px;cursor:pointer;min-height:22px;display:flex;align-items:center;justify-content:center;position:relative}
.cal-day:hover{background:#eee}.cal-day.today{background:#3498db;color:#fff;font-weight:700}.cal-day.selected{background:#2ecc71;color:#fff}
.cal-day.holiday{background:#ffe0e0;color:#c0392b;font-weight:700}.cal-day.payday{border:2px solid #3498db}
.cal-day.has-event::after{content:"";position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:3px;height:3px;background:#e67e22;border-radius:50%}
.cal-legend{display:flex;gap:5px;font-size:8px;margin-bottom:4px}.cal-legend span{display:flex;align-items:center;gap:2px}.cal-legend .lg{width:7px;height:7px;border-radius:3px;display:inline-block}
.cal-events{margin-top:4px;border-top:1px solid #eee;padding-top:4px;max-height:80px;overflow-y:auto}
.cal-events h5{margin:0 0 3px;font-size:9px}.cal-ev-item{padding:2px 4px;margin:1px 0;border-radius:3px;font-size:9px;display:flex;justify-content:space-between}
.cal-ev-item.hol{background:#ffe0e0}.cal-ev-item.pay{background:#e0f0ff}.cal-ev-item.usr{background:#fff8e0}
.cal-ev-del{color:#e74c3c;cursor:pointer;font-size:8px}
.cal-add{margin-top:4px;display:flex;gap:2px}.cal-add input{flex:1;padding:3px;border:1px solid #ccc;border-radius:5px;font-size:9px}
#dashBtn{position:fixed;right:0;top:50%;transform:translateY(-50%);background:#2c3e50;color:#fff;border:none;padding:8px 5px;border-radius:8px 0 0 8px;cursor:pointer;font-size:12px;z-index:90;writing-mode:vertical-rl}
#dashboard{position:fixed;right:-310px;top:0;width:300px;height:100vh;background:#fff;box-shadow:-3px 0 15px rgba(0,0,0,.15);overflow-y:auto;padding:15px 12px;transition:right .3s ease;z-index:89}
#dashboard.open{right:0}
.dash-card{background:#f8f9fa;border-radius:10px;padding:10px;margin-bottom:10px}.dash-card h4{margin:0 0 6px;font-size:12px;color:#666}
.dash-row{display:flex;justify-content:space-between;align-items:center;margin:4px 0;font-size:12px}
.dash-bar-bg{flex:1;height:10px;background:#eee;border-radius:5px;margin:0 6px}.dash-bar{height:10px;border-radius:5px}
.dash-num{font-weight:700;min-width:18px;text-align:right;font-size:11px}
.dash-summary{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.dash-stat{background:#f0f0f0;border-radius:8px;padding:8px;text-align:center}.dash-stat .num{font-size:20px;font-weight:700}.dash-stat .label{font-size:10px;color:#666}
.progress-ring{width:70px;height:70px;margin:0 auto 6px;position:relative}.progress-ring svg{transform:rotate(-90deg)}.progress-ring .pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700}
.dash-alert{background:#fdebd0;border-left:4px solid #e67e22;padding:6px;border-radius:4px;margin-bottom:6px;font-size:11px}.dash-alert.red{background:#fadbd8;border-left-color:#e74c3c}
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:999;justify-content:center;align-items:center}#lightbox img{max-width:95%;max-height:95%;border-radius:8px}#lightbox .lb-close{position:absolute;top:20px;right:30px;color:#fff;font-size:36px;cursor:pointer}
#darkToggle{position:fixed;top:10px;left:10px;z-index:999;background:#333;color:#fff;border:none;border-radius:50%;width:32px;height:32px;font-size:16px;cursor:pointer}
body.dark{background:#0d0d0d!important;color:#e0e0e0}body.dark #topFixed{background:#0d0d0d;border-bottom-color:#333}body.dark h1{color:#e0e0e0}
body.dark table{background:#1a1a1a}body.dark th{background:#111}body.dark td{border-color:#333;color:#e0e0e0;background:#1a1a1a}body.dark tr:hover{background:#222!important}
body.dark select,body.dark input[type="date"],body.dark input[type="text"]{background:#1a1a1a;color:#e0e0e0;border-color:#444}
body.dark .toolbar input,body.dark .toolbar select{background:#1a1a1a;color:#e0e0e0;border-color:#444}
body.dark #dashboard{background:#111;color:#e0e0e0}body.dark .dash-card{background:#1a1a1a}body.dark .dash-stat{background:#1a1a1a}body.dark .dash-bar-bg{background:#333}
body.dark .tl-panel{background:#1a1a1a;border-color:#333}body.dark .tl-add input,body.dark .tl-add textarea{background:#222;color:#e0e0e0;border-color:#444}
body.dark .tl-item:hover{background:rgba(255,255,255,.05)}body.dark #ctxMenu{background:#1a1a1a;border-color:#444}body.dark #ctxMenu .ctx-item:hover{background:#333}
body.dark #formatBar button{background:#333;color:#e0e0e0;border-color:#444}body.dark #formatBar select{background:#1a1a1a;color:#e0e0e0;border-color:#444}
body.dark #notifPanel{background:#1a1a1a;border-color:#444;color:#e0e0e0}body.dark .notif-item.overdue{background:#2a1515}body.dark .notif-item.today{background:#2a2515}body.dark .notif-item.upcoming{background:#15202a}
body.dark #notifActions{background:#3a3a1a}
body.dark #calInline{background:#1a1a1a;border-color:#333;color:#e0e0e0}body.dark .cal-day:hover{background:#333}body.dark .cal-day.holiday{background:#3a1a1a;color:#ff6b6b}
body.dark .cal-ev-item{background:#222}body.dark .cal-add input{background:#222;color:#e0e0e0;border-color:#444}
body.dark #dashBtn{background:#1a1a1a}body.dark .count{color:#999}body.dark ::placeholder{color:#666}
#scrollArea table thead th { position:sticky; top:25px; z-index:4; }
</style>
</head>
<body>
<button id="darkToggle" onclick="toggleDark()">🌙</button>
<button id="notifBell" onclick="toggleNotif()">🔔<span id="notifBadge">0</span></button>
<div id="notifPanel"><h4 style="margin:0 0 8px;font-size:13px;">🔔 Notifications <small style="color:#888;font-weight:400;">(right-click to delete)</small></h4><div id="notifActions"><input type="checkbox" id="notifSelAll" onchange="toggleSelAll(this)"> Select All <button class="btn-del" onclick="delSelNotifs()">🗑️ Delete</button></div><div id="notifList"></div></div>
<div id="topFixed">
<div id="topLeft">
<h1>📋 Work Tracker</h1>
<div class="toolbar">
<button class="btn-add" onclick="addRow()">➕ Add Task</button>
<a href="projects.html" class="nav-btn">🚀 Projects</a>
<button class="btn-export" onclick="exportCSV()">⬇️ CSV</button>
<button class="btn-export" style="background:#c0392b" onclick="exportPDF()">📄 PDF</button>
<button onclick="exportBackup()" style="background:#34495e;color:#fff">💾 Backup</button>
<button onclick="document.getElementById('impF').click()" style="background:#8e44ad;color:#fff">📂 Restore</button>
<input type="file" id="impF" accept=".json" style="display:none" onchange="importBackup(this)">
<input type="text" id="search" placeholder="🔍 Search..." onkeyup="renderAll()">
<select id="filterStatus" onchange="renderAll()"><option value="">— All —</option><option value="To Do">To Do</option><option value="In Progress">In Progress</option><option value="Done">Done</option><option value="Blocked">Blocked</option></select>
<span class="count" id="count"></span>
</div>
<div id="formatBar"><span>Format:</span><button onclick="fmt('bold')" style="font-weight:bold">B</button><button onclick="fmt('italic')" style="font-style:italic">I</button><button onclick="fmt('underline')" style="text-decoration:underline">U</button><button onclick="fmt('strikeThrough')" style="text-decoration:line-through">S</button><select onchange="fmtC(this.value);this.selectedIndex=0"><option value="">🎨</option><option value="red">Red</option><option value="blue">Blue</option><option value="green">Green</option><option value="orange">Orange</option><option value="black">Black</option></select><select onchange="fmtB(this.value);this.selectedIndex=0"><option value="">🖍️</option><option value="yellow">Yellow</option><option value="#aaf">Blue</option><option value="#afa">Green</option><option value="transparent">None</option></select><button onclick="fmt('removeFormat')">🧹</button></div>
<p style="font-size:10px;color:#888;margin:0">💡 Right-click row to delete | "Done" hidden below</p>
</div>
<div id="calInline">
<div class="cal-nav"><button onclick="calNav(-1)">◀</button><span id="calTitle"></span><button onclick="calNav(1)">▶</button></div>
<div class="cal-legend"><span><div class="lg" style="background:#ffe0e0"></div>Hol</span><span><div class="lg" style="border:2px solid #3498db"></div>Pay</span><span><div class="lg" style="background:#e67e22;width:4px;height:4px;border-radius:50%"></div>Evt</span></div>
<div class="cal-grid" id="calGrid"></div>
<div class="cal-events" id="calEvents"></div>
</div>
</div>
<div id="scrollArea">
<span class="count" id="count" style="position:sticky;top:0;right:0;display:block;text-align:right;padding:4px 0;z-index:5;"></span>
<table><thead><tr><th>#</th><th>Task</th><th style="min-width:180px">Problem</th><th style="min-width:160px">Action</th><th>Who</th><th>Start</th><th>End</th><th style="min-width:180px">Notes / Timeline</th><th style="width:95px">Status</th></tr></thead><tbody id="tbody"></tbody></table>
<div style="margin-top:12px"><button onclick="toggleDone()" style="background:#1e8449;color:#fff;padding:8px 14px;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:12px">📦 Completed (<span id="doneCount">0</span>)</button></div>
<div id="doneSection" style="display:none;margin-top:8px"><table><thead><tr><th>#</th><th>Task</th><th>Problem</th><th>Action</th><th>Who</th><th>Start</th><th>End</th><th>Notes</th><th>Restore</th></tr></thead><tbody id="doneTbody"></tbody></table></div>
</div>
<div id="ctxMenu"><div class="ctx-item ctx-del" onclick="ctxDel()">🗑️ Delete Task</div></div>
<button id="dashBtn" onclick="toggleDash()">📊</button>
<div id="dashboard"><h3 style="display:flex;justify-content:space-between;align-items:center;font-size:14px">📊 Dashboard <button onclick="toggleDash()" style="background:none;color:#999;font-size:18px;padding:0">✕</button></h3><div id="dashContent"></div></div>
<div id="lightbox" onclick="if(event.target.id==='lightbox')closeLB()"><span class="lb-close" onclick="closeLB()">&times;</span><img id="lb-img" src=""></div>
<script>
var data=JSON.parse(localStorage.getItem("workTracker")||"[]");
var openTL={};var ctxTarget=-1;var showDone=false;
var calDate=new Date();var calEvents=JSON.parse(localStorage.getItem("calEvents")||"[]");
var calSelected=new Date().toISOString().slice(0,10);
  
data.forEach(function(r){if(!r.timeline)r.timeline=[];if(!r.imgs)r.imgs=[];if(r.img){r.imgs.push(r.img);delete r.img;}r.timeline.forEach(function(t){if(!t.status)t.status="wait";if(!t.title)t.title=t.text||"Update";});});

var holidays={"2025-04-14":"Songkran","2025-04-15":"Songkran","2025-04-16":"Songkran Sub","2025-05-01":"Labour Day","2025-05-12":"Wisakha Bucha Sub","2025-07-10":"Asarnha Bucha","2025-07-11":"Buddhist Lent","2025-07-28":"King Birthday","2025-08-12":"Mother's Day","2025-10-13":"Rama IX Memorial","2025-10-23":"Chulalongkorn Day","2025-11-07":"Shift Holiday","2025-11-21":"Shift Holiday","2025-12-05":"Father's Day","2025-12-31":"Year End","2026-01-01":"New Year","2026-01-02":"New Year Holiday","2026-01-03":"New Year Shift","2026-02-13":"Makhabucha Sub","2026-03-03":"Makhabucha","2026-04-13":"Songkran","2026-04-14":"Songkran","2026-04-15":"Songkran","2026-05-01":"Labour Day","2026-06-01":"Wisakha Bucha Sub","2026-06-03":"Queen Suthida Birthday","2026-07-03":"Asarnha Bucha","2026-07-28":"King Birthday","2026-07-29":"Buddhist Lent","2026-08-12":"Mother's Day","2026-09-11":"Shift Holiday","2026-09-25":"Shift Holiday","2026-10-13":"Rama IX Memorial","2026-10-23":"Chulalongkorn Day","2026-11-06":"Shift Holiday","2026-11-20":"Shift Holiday","2026-12-05":"Father's Day","2026-12-07":"Father's Day Sub","2026-12-31":"Year End","2027-01-01":"New Year","2027-01-02":"New Year Shift","2027-01-04":"New Year Office","2027-01-15":"Shift Holiday","2027-02-22":"Makhabucha Sub","2027-03-12":"Shift Holiday","2027-03-22":"Makhabucha"};
var paydays={"2025-04-11":"Pay","2025-04-25":"Pay","2025-05-09":"Pay","2025-05-23":"Pay","2025-06-06":"Pay","2025-06-20":"Pay","2025-07-04":"Pay","2025-07-18":"Pay","2025-08-01":"Pay","2025-08-15":"Pay","2025-08-29":"Pay","2025-09-12":"Pay","2025-09-26":"Pay","2025-10-10":"Pay","2025-10-24":"Pay","2025-11-07":"Pay","2025-11-21":"Pay","2025-12-05":"Pay","2025-12-19":"Pay","2026-01-09":"Pay","2026-01-23":"Pay","2026-02-06":"Pay","2026-02-20":"Pay","2026-03-06":"Pay","2026-03-20":"Pay","2026-04-10":"Pay","2026-04-24":"Pay","2026-05-08":"Pay","2026-05-22":"Pay","2026-06-05":"Pay","2026-06-19":"Pay","2026-07-03":"Pay","2026-07-17":"Pay","2026-08-07":"Pay","2026-08-21":"Pay","2026-09-04":"Pay","2026-09-18":"Pay","2026-10-02":"Pay","2026-10-16":"Pay","2026-10-30":"Pay","2026-11-13":"Pay","2026-11-27":"Pay","2026-12-11":"Pay","2026-12-25":"Pay","2027-01-08":"Pay","2027-01-22":"Pay","2027-02-05":"Pay","2027-02-19":"Pay","2027-03-05":"Pay","2027-03-19":"Pay"};

function save(){try{localStorage.setItem("workTracker",JSON.stringify(data));}catch(e){alert("Storage full!");}}
function saveCal(){localStorage.setItem("calEvents",JSON.stringify(calEvents));}
function addRow(){data.push({task:"New Task",detail:"",solution:"",owner:"",status:"To Do",start:"",end:"",note:"",imgs:[],timeline:[]});save();renderAll();}
function edit(i,field,el){if(el.value!==undefined)data[i][field]=el.value;else data[i][field]=el.innerHTML;save();renderDash();}
function fmt(cmd){document.execCommand(cmd,false,null);}
function fmtC(c){if(c)document.execCommand("foreColor",false,c);}
function fmtB(c){if(c)document.execCommand("hiliteColor",false,c);}

document.addEventListener("click",function(){document.getElementById("ctxMenu").style.display="none";});
document.addEventListener("contextmenu",function(e){var tr=e.target.closest("#tbody tr");if(!tr)return;e.preventDefault();ctxTarget=parseInt(tr.getAttribute("data-idx"));var m=document.getElementById("ctxMenu");m.style.display="block";m.style.left=e.pageX+"px";m.style.top=e.pageY+"px";});
function ctxDel(){if(ctxTarget>=0&&confirm("Delete?")){data.splice(ctxTarget,1);save();renderAll();}document.getElementById("ctxMenu").style.display="none";}

function uploadImg(i,input){var files=Array.from(input.files);if(!files.length)return;var ld=0;files.forEach(function(f){if(f.size>5*1024*1024){ld++;if(ld===files.length){save();renderAll();}return;}var r=new FileReader();r.onload=function(e){compImg(e.target.result,800,.6,function(c){data[i].imgs.push(c);ld++;if(ld===files.length){save();renderAll();}});};r.readAsDataURL(f);});}
function removeImg(i,j){if(confirm("Remove?")){data[i].imgs.splice(j,1);save();renderAll();}}
function compImg(b,mW,q,cb){var img=new Image();img.onload=function(){var w=img.width,h=img.height;if(w>mW){h=Math.round(h*mW/w);w=mW;}var c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);cb(c.toDataURL("image/jpeg",q));};img.src=b;}
function closeLB(){document.getElementById("lightbox").style.display="none";}
document.addEventListener("click",function(e){if(e.target.tagName==="IMG"&&e.target.closest(".img-area")){document.getElementById("lb-img").src=e.target.src;document.getElementById("lightbox").style.display="flex";}});
function imgHTML(i){var imgs=data[i].imgs||[];var h='<div class="img-area">';imgs.forEach(function(s,j){h+='<div class="iw"><img src="'+s+'"><button class="ir" onclick="event.stopPropagation();removeImg('+i+','+j+')">&times;<\/button><\/div>';});h+='<\/div><input type="file" accept="image/*" multiple style="font-size:10px;margin-top:3px" onchange="uploadImg('+i+',this)">';return h;}

function tlHTML(i){
  var tl=data[i].timeline;var op=openTL["w"+i]?"open":"";
  var h='<button class="btn-tl" onclick="tglTL('+i+')">📅 Timeline ('+tl.length+')<\/button>';
  h+='<div class="tl-panel '+op+'" id="tlw'+i+'">';
  h+='<div class="tl-legend"><span><div class="dot" style="background:#bbb"><\/div>Wait<\/span><span><div class="dot" style="background:#f39c12"><\/div>Doing<\/span><span><div class="dot" style="background:#27ae60"><\/div>Done<\/span><\/div>';
  h+='<div class="tl-add"><input type="date" id="tlD'+i+'" value="'+new Date().toISOString().slice(0,10)+'" style="width:95px"><input type="text" id="tlT'+i+'" placeholder="Title..." style="width:75px"><textarea id="tlX'+i+'" placeholder="Details..."><\/textarea><button class="btn-add" style="font-size:10px;padding:4px 6px" onclick="addTL('+i+')">+<\/button><\/div>';
  h+='<div class="timeline">';
  if(!tl.length)h+='<p style="color:#999;font-size:10px">No items.<\/p>';
  else tl.forEach(function(t,j){var cls=t.status==="done"?"nd-done":t.status==="prog"?"nd-prog":"nd-wait";
    h+='<div class="tl-item '+cls+'" onclick="cycleTL('+i+','+j+')"><div class="tl-date">'+t.date+'<\/div><div class="tl-title">'+t.title+'<\/div>';
    if(t.text)h+='<div class="tl-desc">'+t.text+'<\/div>';
    h+='<button class="tl-edit-btn" onclick="event.stopPropagation();editTL('+i+','+j+')" title="Edit">✏️<\/button>';
    h+='<button class="tl-del-btn" onclick="event.stopPropagation();delTL('+i+','+j+')" title="Delete">✕<\/button><\/div>';
  });
  h+='<\/div><\/div>';return h;
}
function tglTL(i){if(openTL["w"+i])delete openTL["w"+i];else openTL["w"+i]=true;var el=document.getElementById("tlw"+i);if(el)el.classList.toggle("open");}
function addTL(i){var d=document.getElementById("tlD"+i).value;var t=document.getElementById("tlT"+i).value.trim();var x=document.getElementById("tlX"+i).value.trim();if(!t&&!x)return;data[i].timeline.push({date:d,title:t||"Step "+(data[i].timeline.length+1),text:x,status:"wait"});openTL["w"+i]=true;save();renderAll();}
function delTL(i,j){if(confirm("Delete?")){data[i].timeline.splice(j,1);openTL["w"+i]=true;save();renderAll();}}
function cycleTL(i,j){var t=data[i].timeline[j];t.status=t.status==="wait"?"prog":t.status==="prog"?"done":"wait";openTL["w"+i]=true;save();renderAll();}
function editTL(i,j){var t=data[i].timeline[j];var nt=prompt("Title:",t.title);if(nt===null)return;var nx=prompt("Description:",t.text||"");if(nx===null)return;var nd=prompt("Date (YYYY-MM-DD):",t.date);if(nd===null)return;t.title=nt||t.title;t.text=nx;t.date=nd||t.date;openTL["w"+i]=true;save();renderAll();}

function optH(o,c){return o.map(function(v){return'<option '+(v===c?"selected":"")+'>'+v+'<\/option>';}).join("");}

function renderAll(){
  var kw=document.getElementById("search").value.toLowerCase();
  var sF=document.getElementById("filterStatus").value;
  var tb=document.getElementById("tbody");tb.innerHTML="";var count=0;
  data.forEach(function(r,i){
    if(r.status==="Done")return;
    var txt=(r.task+" "+r.detail+" "+r.solution+" "+r.owner+" "+r.note).toLowerCase();
    if(kw&&txt.indexOf(kw)===-1)return;
    if(sF&&r.status!==sF)return;
    count++;
    var tr=document.createElement("tr");tr.setAttribute("data-idx",i);
    tr.innerHTML='<td>'+count+'<\/td><td contenteditable onblur="edit('+i+",'task',this)\">"+r.task+'<\/td><td><div contenteditable onblur="edit('+i+",'detail',this)\">"+r.detail+'<\/div>'+imgHTML(i)+'<\/td><td contenteditable onblur="edit('+i+",'solution',this)\">"+r.solution+'<\/td><td contenteditable onblur="edit('+i+",'owner',this)\">"+r.owner+'<\/td><td><input type="date" value="'+r.start+'" onchange="edit('+i+",'start',this)\"><\/td><td><input type=\"date\" value=\""+r.end+'" onchange="edit('+i+",'end',this)\"><\/td><td><div contenteditable onblur=\"edit("+i+",'note',this)\">"+r.note+'<\/div>'+tlHTML(i)+'<\/td><td><select onchange="edit('+i+",'status',this);renderAll()\">"+optH(["To Do","In Progress","Done","Blocked"],r.status)+'<\/select><\/td>';
    tb.appendChild(tr);
  });
  document.getElementById("count").textContent="Total: "+count;
  renderDone();renderDash();renderNotif();renderCal();
}

function toggleDone(){showDone=!showDone;document.getElementById("doneSection").style.display=showDone?"block":"none";}
function renderDone(){var tb=document.getElementById("doneTbody");tb.innerHTML="";var c=0;data.forEach(function(r,i){if(r.status!=="Done")return;c++;var tr=document.createElement("tr");tr.style.background="#eafaf1";tr.innerHTML='<td>'+c+'<\/td><td>'+r.task+'<\/td><td>'+r.detail+'<\/td><td>'+r.solution+'<\/td><td>'+r.owner+'<\/td><td>'+r.start+'<\/td><td>'+r.end+'<\/td><td>'+r.note+'<\/td><td><button class="btn-add" style="font-size:10px;padding:4px 7px" onclick="data['+i+'].status=\'In Progress\';save();renderAll()">🔄<\/button><\/td>';tb.appendChild(tr);});document.getElementById("doneCount").textContent=c;}

function toggleDash(){var db=document.getElementById("dashboard");db.classList.toggle("open");document.getElementById("dashBtn").style.display=db.classList.contains("open")?"none":"block";}
function renderDash(){
  var total=data.length;if(!total){document.getElementById("dashContent").innerHTML='<p style="color:#999">No tasks.<\/p>';return;}
  var sT=0,sP=0,sD=0,sB=0,od=0,td=new Date().toISOString().slice(0,10),pc={};
  data.forEach(function(r){if(r.status==="To Do")sT++;else if(r.status==="In Progress")sP++;else if(r.status==="Done")sD++;else sB++;if(r.end&&r.end<td&&r.status!=="Done")od++;if(r.owner)pc[r.owner]=(pc[r.owner]||0)+1;});
  var pct=Math.round((sD/total)*100),ci=2*Math.PI*30,of2=ci-(pct/100)*ci,rc=pct>=75?"#27ae60":pct>=50?"#f39c12":"#e74c3c";
  var h='<div class="dash-summary"><div class="dash-stat"><div class="num">'+total+'<\/div><div class="label">Total<\/div><\/div><div class="dash-stat"><div class="num" style="color:#2471a3">'+sP+'<\/div><div class="label">Progress<\/div><\/div><div class="dash-stat"><div class="num" style="color:#1e8449">'+sD+'<\/div><div class="label">Done<\/div><\/div><div class="dash-stat"><div class="num" style="color:#c0392b">'+sB+'<\/div><div class="label">Blocked<\/div><\/div><\/div>';
  if(od>0)h+='<div class="dash-alert red">⚠️ '+od+' overdue!<\/div>';
  h+='<div class="dash-card"><h4>✅ Completion<\/h4><div class="progress-ring"><svg width="70" height="70"><circle cx="35" cy="35" r="30" fill="none" stroke="#eee" stroke-width="7"><\/circle><circle cx="35" cy="35" r="30" fill="none" stroke="'+rc+'" stroke-width="7" stroke-dasharray="'+ci+'" stroke-dashoffset="'+of2+'" stroke-linecap="round"><\/circle><\/svg><div class="pct" style="color:'+rc+'">'+pct+'%<\/div><\/div><\/div>';
  h+='<div class="dash-card"><h4>📈 Status<\/h4>'+dB("To Do",sT,total,"#95a5a6")+dB("Progress",sP,total,"#f39c12")+dB("Done",sD,total,"#27ae60")+dB("Blocked",sB,total,"#e74c3c")+'<\/div>';
  var ps=Object.keys(pc);if(ps.length){h+='<div class="dash-card"><h4>👥 Person<\/h4>';ps.sort(function(a,b){return pc[b]-pc[a];});ps.forEach(function(p){h+=dB(p,pc[p],total,"#8e44ad");});h+='<\/div>';}
  document.getElementById("dashContent").innerHTML=h;
}
function dB(l,v,m,c){var w=m>0?Math.round((v/m)*100):0;return'<div class="dash-row"><span style="min-width:65px">'+l+'<\/span><div class="dash-bar-bg"><div class="dash-bar" style="width:'+w+'%;background:'+c+'"><\/div><\/div><span class="dash-num">'+v+'<\/span><\/div>';}

// === CALENDAR ===
function calNav(dir){calDate.setMonth(calDate.getMonth()+dir);renderCal();}
function renderCal(){
  var y=calDate.getFullYear(),m=calDate.getMonth();
  var mn=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  document.getElementById("calTitle").textContent=mn[m]+" "+y;
  var fd=new Date(y,m,1).getDay(),dm=new Date(y,m+1,0).getDate(),ts=new Date().toISOString().slice(0,10);
  var h='<div class="hd">S<\/div><div class="hd">M<\/div><div class="hd">T<\/div><div class="hd">W<\/div><div class="hd">T<\/div><div class="hd">F<\/div><div class="hd">S<\/div>';
  for(var i=0;i<fd;i++)h+='<div><\/div>';
  for(var d=1;d<=dm;d++){var ds=y+"-"+String(m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");var cls="cal-day";if(ds===ts)cls+=" today";if(ds===calSelected)cls+=" selected";if(holidays[ds])cls+=" holiday";if(paydays[ds])cls+=" payday";if(calEvents.some(function(e){return e.date===ds;}))cls+=" has-event";h+='<div class="'+cls+'" onclick="selDay(\''+ds+'\')">'+d+'<\/div>';}
  document.getElementById("calGrid").innerHTML=h;
  showDayEv(calSelected);
}
function selDay(ds){calSelected=ds;renderCal();}
function showDayEv(ds){
  var h='<h5>'+ds+'<\/h5>';
  if(holidays[ds])h+='<div class="cal-ev-item hol">🔴 '+holidays[ds]+'<\/div>';
  if(paydays[ds])h+='<div class="cal-ev-item pay">💰 Pay Day<\/div>';
  calEvents.forEach(function(ev,idx){if(ev.date===ds)h+='<div class="cal-ev-item usr"><span>📌 '+ev.title+'<\/span><span class="cal-ev-del" onclick="delCalEv('+idx+')">[x]<\/span><\/div>';});
  h+='<div class="cal-add"><input type="text" id="calIn" placeholder="+ event" onkeydown="if(event.key===\'Enter\')addCalEv()"><button class="btn-add" style="font-size:9px;padding:3px 6px" onclick="addCalEv()">+<\/button><\/div>';
  document.getElementById("calEvents").innerHTML=h;
}
function addCalEv(){var inp=document.getElementById("calIn");var t=inp.value.trim();if(!t)return;calEvents.push({date:calSelected,title:t});saveCal();renderCal();renderNotif();}
function delCalEv(idx){calEvents.splice(idx,1);saveCal();renderCal();renderNotif();}

// === EXPORT ===
function exportCSV(){var hd=["#","Task","Problem","Action","Who","Status","Start","End","Notes"];var esc=function(v){return'"'+String(v||"").replace(/"/g,'""')+'"';};var rows=data.map(function(r,i){return[i+1,r.task,r.detail,r.solution,r.owner,r.status,r.start,r.end,r.note].map(esc).join(",");});var csv="\uFEFF"+[hd.map(esc).join(",")].concat(rows).join("\r\n");var b=new Blob([csv],{type:"text/csv;charset=utf-8;"});var a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="tracker-"+new Date().toISOString().slice(0,10)+".csv";a.click();}
function exportPDF(){var w=window.open("","_blank");var h='<html><head><meta charset="UTF-8"><title>Work Tracker<\/title><style>body{font-family:Arial;padding:20px}h1{text-align:center}table{width:100%;border-collapse:collapse;font-size:11px}th,td{border:1px solid #999;padding:5px;text-align:left}th{background:#34495e;color:#fff}@media print{button{display:none}}<\/style><\/head><body><h1>📋 Work Tracker<\/h1><button onclick="window.print()" style="padding:8px 16px;background:#c0392b;color:#fff;border:none;border-radius:8px;cursor:pointer">🖨️<\/button><table><tr><th>#<\/th><th>Task<\/th><th>Problem<\/th><th>Action<\/th><th>Who<\/th><th>Status<\/th><th>Start<\/th><th>End<\/th><th>Notes<\/th><\/tr>';data.forEach(function(r,i){h+='<tr><td>'+(i+1)+'<\/td><td>'+r.task+'<\/td><td>'+r.detail+'<\/td><td>'+r.solution+'<\/td><td>'+r.owner+'<\/td><td>'+r.status+'<\/td><td>'+r.start+'<\/td><td>'+r.end+'<\/td><td>'+r.note+'<\/td><\/tr>';});h+='<\/table><\/body><\/html>';w.document.write(h);w.document.close();}
function exportBackup(){var d={workTracker:localStorage.getItem("workTracker"),projectTracker:localStorage.getItem("projectTracker"),workTrackerPeople:localStorage.getItem("workTrackerPeople"),calEvents:localStorage.getItem("calEvents")};var b=new Blob([JSON.stringify(d)],{type:"application/json"});var a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="backup-"+new Date().toISOString().slice(0,10)+".json";a.click();}
function importBackup(input){var f=input.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){try{var d=JSON.parse(e.target.result);if(d.workTracker)localStorage.setItem("workTracker",d.workTracker);if(d.projectTracker)localStorage.setItem("projectTracker",d.projectTracker);if(d.workTrackerPeople)localStorage.setItem("workTrackerPeople",d.workTrackerPeople);if(d.calEvents)localStorage.setItem("calEvents",d.calEvents);alert("✅ Done!");location.reload();}catch(err){alert("⚠️ Invalid!");}};r.readAsText(f);input.value="";}

function toggleDark(){document.body.classList.toggle("dark");var d=document.body.classList.contains("dark");localStorage.setItem("darkMode",d?"on":"off");document.getElementById("darkToggle").textContent=d?"☀️":"🌙";}
if(localStorage.getItem("darkMode")==="on"){document.body.classList.add("dark");document.getElementById("darkToggle").textContent="☀️";}
// ===== NOTIFICATION SYSTEM (NEW) =====
var notifRead = JSON.parse(localStorage.getItem("notifRead") || "[]");
var notifDeleted = JSON.parse(localStorage.getItem("notifDeleted") || "[]");
var notifDelMode = false;

function toggleNotif(){
  var p = document.getElementById("notifPanel");
  p.style.display = p.style.display === "block" ? "none" : "block";
  notifDelMode = false;
  if(document.getElementById("notifActions")) document.getElementById("notifActions").style.display = "none";
}

// Close when click outside
document.addEventListener("click", function(e){
  if(!e.target.closest("#notifBell") && !e.target.closest("#notifPanel")){
    document.getElementById("notifPanel").style.display = "none";
  }
});

// Right-click to enter delete mode
document.getElementById("notifPanel").addEventListener("contextmenu", function(e){
  e.preventDefault();
  notifDelMode = !notifDelMode;
  document.getElementById("notifActions").style.display = notifDelMode ? "block" : "none";
  document.querySelectorAll(".ni-check").forEach(function(c){ c.style.display = notifDelMode ? "inline" : "none"; });
});

function toggleSelAll(el){
  document.querySelectorAll(".ni-check").forEach(function(c){ c.checked = el.checked; });
}

function delSelNotifs(){
  document.querySelectorAll(".ni-check:checked").forEach(function(c){
    var id = c.getAttribute("data-id");
    if(notifDeleted.indexOf(id) === -1) notifDeleted.push(id);
  });
  localStorage.setItem("notifDeleted", JSON.stringify(notifDeleted));
  notifDelMode = false;
  renderNotif();
}

function getNotifs(){
  var now = new Date();
  var td = now.toISOString().slice(0,10);
  var tm = new Date(now); tm.setDate(tm.getDate()+1); var tms = tm.toISOString().slice(0,10);
  var i3 = new Date(now); i3.setDate(i3.getDate()+3); var i3s = i3.toISOString().slice(0,10);
  var ns = [];

  data.forEach(function(r, idx){
    if(r.status === "Done") return;
    var dl = r.end || ""; if(!dl) return;
    var id = "task_" + idx + "_" + dl;
    if(dl < td) ns.push({id:id, type:"overdue", task:r.task, date:dl, msg:"⚠️ OVERDUE!"});
    else if(dl === td) ns.push({id:id, type:"today", task:r.task, date:dl, msg:"⏰ Due TODAY!"});
    else if(dl === tms) ns.push({id:id, type:"upcoming", task:r.task, date:dl, msg:"📅 Due TOMORROW"});
    else if(dl <= i3s) ns.push({id:id, type:"upcoming", task:r.task, date:dl, msg:"📅 " + Math.ceil((new Date(dl)-now)/864e5) + " days left"});
  });

  calEvents.forEach(function(ev, idx){
    var id = "cal_" + idx + "_" + ev.date;
    if(ev.date === td) ns.push({id:id, type:"today", task:"📌 " + ev.title, date:ev.date, msg:"⏰ TODAY!"});
    else if(ev.date === tms) ns.push({id:id, type:"upcoming", task:"📌 " + ev.title, date:ev.date, msg:"📅 TOMORROW"});
    else if(ev.date > td && ev.date <= i3s) ns.push({id:id, type:"upcoming", task:"📌 " + ev.title, date:ev.date, msg:"📅 " + Math.ceil((new Date(ev.date)-now)/864e5) + " days"});
  });

  Object.keys(holidays).forEach(function(d){
    var id = "hol_" + d;
    if(d === tms) ns.push({id:id, type:"upcoming", task:"🔴 " + holidays[d], date:d, msg:"🎉 Holiday TOMORROW!"});
    else if(d > td && d <= i3s) ns.push({id:id, type:"upcoming", task:"🔴 " + holidays[d], date:d, msg:"🎉 " + Math.ceil((new Date(d)-now)/864e5) + " days"});
  });

  Object.keys(paydays).forEach(function(d){
    var id = "pay_" + d;
    if(d === td) ns.push({id:id, type:"today", task:"💰 Pay Day!", date:d, msg:"💰 Today!"});
    else if(d === tms) ns.push({id:id, type:"upcoming", task:"💰 Pay Day", date:d, msg:"💰 Tomorrow!"});
  });

  // Filter deleted
  ns = ns.filter(function(n){ return notifDeleted.indexOf(n.id) === -1; });
  ns.sort(function(a,b){ return {overdue:0,today:1,upcoming:2}[a.type] - {overdue:0,today:1,upcoming:2}[b.type]; });
  return ns;
}

function renderNotif(){
  var ns = getNotifs();
  var unread = ns.filter(function(n){ return notifRead.indexOf(n.id) === -1; });

  var badge = document.getElementById("notifBadge");
  if(unread.length > 0){ badge.style.display = "flex"; badge.textContent = unread.length; }
  else { badge.style.display = "none"; }

  var list = document.getElementById("notifList");
  if(ns.length === 0){ list.innerHTML = '<p style="color:#999;font-size:11px">✅ All clear!</p>'; return; }

  var h = "";
  ns.forEach(function(n){
    var isRead = notifRead.indexOf(n.id) !== -1;
    h += '<div class="notif-item ' + n.type + (isRead ? " read" : "") + '">';
    h += '<input type="checkbox" class="ni-check" data-id="' + n.id + '" style="display:' + (notifDelMode ? "inline" : "none") + ';margin-right:6px;">';
    h += '<span onclick="clickNotif(\'' + n.id + '\',\'' + n.date + '\')" style="cursor:pointer">';
    h += '<div class="ni-title">' + n.task + '<\/div>';
    h += '<div>' + n.msg + '<\/div>';
    h += '<div class="ni-date">' + n.date + '<\/div>';
    h += '<\/span><\/div>';
  });
  list.innerHTML = h;
}

function clickNotif(id, date){
  // Mark as read
  if(notifRead.indexOf(id) === -1){
    notifRead.push(id);
    localStorage.setItem("notifRead", JSON.stringify(notifRead));
  }

  // Close panel
  document.getElementById("notifPanel").style.display = "none";

  // If task notification → scroll & flash
  if(id.indexOf("task_") === 0){
    var taskIdx = parseInt(id.split("_")[1]);
    var rows = document.querySelectorAll("#tbody tr");
    rows.forEach(function(tr){
      if(parseInt(tr.getAttribute("data-idx")) === taskIdx){
        tr.scrollIntoView({behavior:"smooth", block:"center"});
        tr.classList.add("flash");
        setTimeout(function(){ tr.classList.remove("flash"); }, 3000);
      }
    });
  }

  // If holiday/calendar → navigate calendar
  if(id.indexOf("hol_") === 0 || id.indexOf("cal_") === 0 || id.indexOf("pay_") === 0){
    calSelected = date;
    calDate = new Date(date + "T00:00:00");
    renderCal();
  }

  renderNotif();
}
renderAll();
</script>
